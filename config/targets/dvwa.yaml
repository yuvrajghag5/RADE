# ---------------------------------------------------------------------------
# SANDBOX TARGET PROFILE — DVWA (Damn Vulnerable Web Application).
#
# `crawl:` drives LIVE reconnaissance (Layer 2). Recon logs in, sets the
# security level, then crawls the pages below, parsing forms + URL params to
# DISCOVER injection points on the running app. These are data, not code, so
# the scope/credentials of a scan are auditable at a glance.
#
# `injection_points:` is the OLD declared profile, kept only for the offline
# fallback function `discover_from_profile()` (not used by the live path).
# ---------------------------------------------------------------------------
base_url: "http://127.0.0.1:8080"

crawl:
  # --- authentication (DVWA ships with these defaults) ---
  login_path: "/login.php"
  username: "admin"
  password: "password"

  # --- security level: "low" makes the injection points exploitable ---
  security_path: "/security.php"
  security_level: "low"

  # --- best-effort DB setup so a fresh container is usable on first run ---
  setup_path: "/setup.php"
  auto_setup: true

  # --- where to look for injection points ---
  # index_path is scanned for links to /vulnerabilities/* (auto-discovery);
  # seed_paths are always visited even if the menu link is missing.
  index_path: "/index.php"
  seed_paths:
    - "/vulnerabilities/sqli/"
    - "/vulnerabilities/sqli_blind/"
    - "/vulnerabilities/xss_r/"
    - "/vulnerabilities/xss_s/"
    - "/vulnerabilities/exec/"
    - "/vulnerabilities/csrf/"
    - "/vulnerabilities/fi/?page=include.php"

  request_timeout: 10   # seconds per HTTP request

# --- offline fallback profile (discover_from_profile only) -----------------
injection_points:
  - name: "sqli_id"
    url: "/vulnerabilities/sqli/"
    method: "GET"
    param: "id"
    bucket: "url_param"
    classes: ["sqli"]

  - name: "xss_reflected"
    url: "/vulnerabilities/xss_r/"
    method: "GET"
    param: "name"
    bucket: "search_field"
    classes: ["xss", "sqli"]

  - name: "xss_stored"
    url: "/vulnerabilities/xss_s/"
    method: "POST"
    param: "mtxMessage"
    bucket: "comment_field"
    classes: ["xss", "csrf"]

  - name: "command_exec"
    url: "/vulnerabilities/exec/"
    method: "POST"
    param: "ip"
    bucket: "command_exec"
    classes: ["cmdi"]

  - name: "csrf_password"
    url: "/vulnerabilities/csrf/"
    method: "GET"
    param: "password_new"
    bucket: "account_settings"
    classes: ["csrf"]

  - name: "file_inclusion"
    url: "/vulnerabilities/fi/"
    method: "GET"
    param: "page"
    bucket: "ssrf_target"
    classes: ["ssrf"]
